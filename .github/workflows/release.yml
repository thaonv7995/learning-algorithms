name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: false
        default: ""

permissions:
  contents: write

env:
  GO_VERSION: "1.22"

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Pack www bundle
        run: bash scripts/pack-www.sh dist/www

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="1.0.0-dev"
          fi
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o dist/algo-explorer${EXT} ./cmd/algo-explorer/

      - name: Assemble release archive
        run: |
          mkdir -p dist/release
          cp dist/algo-explorer* dist/release/ 2>/dev/null || true
          cp -R dist/www dist/release/www
          echo "${GITHUB_REF_NAME:-dev}" > dist/release/VERSION
          cd dist/release
          NAME="algo-explorer-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "../${NAME}.zip" .
          else
            tar -czf "../${NAME}.tar.gz" .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: algo-explorer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/algo-explorer-*.{tar.gz,zip}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect artifacts + checksums
        run: |
          mkdir -p dist/upload
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/upload/ \;
          cp scripts/install.sh scripts/install.ps1 dist/upload/
          chmod +x dist/upload/install.sh
          cd dist/upload
          sha256sum *.tar.gz *.zip install.sh 2>/dev/null > SHA256SUMS || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
      tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      name: Algorithms Explorer ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
